version: '3.8'

# Production docker-compose — pulls images from Docker Hub
# Usage: docker-compose -f docker-compose.prod.yml up -d

services:

  postgres:
    image: postgres:16-alpine
    container_name: tools_adigicube_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: tools_adigicube
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - adigicube-network
    restart: always
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: ghcr.io/wisnuhid7/appgen_ai-backend:latest
    container_name: tools_adigicube_backend
    environment:
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/tools_adigicube
      - SESSION_SECRET=${SESSION_SECRET}
      - NODE_ENV=production
      - PORT=5000
      - CORS_ORIGINS=https://tools.adigicube.com
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - adigicube-network
    restart: always

  frontend:
    image: ghcr.io/wisnuhid7/appgen_ai-frontend:latest
    container_name: tools_adigicube_frontend
    depends_on:
      - backend
    networks:
      - adigicube-network
    restart: always

  nginx:
    image: nginx:alpine
    container_name: tools_adigicube_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro # SSL certs (optional)
    depends_on:
      - frontend
      - backend
    networks:
      - adigicube-network
    restart: always

volumes:
  postgres_data:

networks:
  adigicube-network:
    driver: bridge
