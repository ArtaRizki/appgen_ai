version: '3.8'

services:

  postgres:
    image: postgres:16-alpine
    container_name: tools_adigicube_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: tools_adigicube
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - adigicube-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: ${DOCKERHUB_REPO}-backend:latest
    container_name: tools_adigicube_backend
    ports:
      - "5001:5000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/tools_adigicube
      - SESSION_SECRET=dev_secret_change_in_production
      - NODE_ENV=production
      - PORT=5000
      - CORS_ORIGINS=http://tools_adigicube_frontend:3000
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - adigicube-network
    restart: unless-stopped

  frontend:
    image: ${DOCKERHUB_REPO}-frontend:latest
    container_name: tools_adigicube_frontend
    environment:
      - VITE_API_URL=http://tools_adigicube_backend:5000
      - NODE_ENV=production
      - PORT=3000
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro # SSL certs (optional)
    depends_on:
      - backend
    networks:
      - adigicube-network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  adigicube-network:
    driver: bridge
